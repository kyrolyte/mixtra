<!doctype html>
<html lang="{{ .Site.Language.Lang | default "en" }}" dir="{{ .Site.Language.LanguageDirection | default "ltr" }}">
  <body style='font-family:system-ui; height:100vh; text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center'>
    <main id="content">
      <style>
        body {
          color: #000;
          background: #fff;
          margin: 0;
        }
        @media (prefers-color-scheme: dark) {
          body {
            color: #fff;
            background: #000;
          }
        }
      </style>
      <h1 style='display: inline-block; margin: 0 20px 0 0; padding-right: 23px; font-size: 24px; font-weight: 500; vertical-align: top; line-height: 49px; font-feature-settings: "rlig" 1,"calt" 1,"ss01" 1,"ss06" 1 !important;'>
        404
      </h1>
      <div style="display: inline-block; text-align: left">
        <h2 style="font-size: 14px; font-weight: 400; line-height: 49px; margin: 0">This page could not be found.</h2>
      </div>
    </main>
  </body>
</html>
